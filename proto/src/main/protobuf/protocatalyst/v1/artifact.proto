syntax = "proto3";
package protocatalyst.v1;
option java_package = "io.protocatalyst.proto.v1";
option java_multiple_files = true;

import "protocatalyst/v1/plan.proto";
import "protocatalyst/v1/physical_plan.proto";
import "protocatalyst/v1/schema.proto";

message CompiledArtifactMsg {
  ArtifactVersionMsg format_version = 1;
  string protocatalyst_version = 2;
  int64 compiled_at = 3;
  int64 content_hash = 4;
  repeated SchemaContractMsg schema_contracts = 5;
  ProtoLogicalPlanMsg plan = 6;
  ProtoSchemaMsg output_schema = 7;
  optional SourceInfoMsg source_info = 8;
  optional ProtoPhysicalPlanMsg physical_plan = 9;
}

message ArtifactVersionMsg {
  int32 major = 1;
  int32 minor = 2;
  int32 patch = 3;
}

message SourceInfoMsg {
  string source_file = 1;
  int32 line_number = 2;
  optional string original_sql = 3;
}
